name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Set up Java (for Android builds)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Android platform scaffolding
        # Creates the missing android/ directory without touching existing files.
        # --project-name must match pubspec.yaml `name`.
        run: flutter create --project-name nud_game --platforms android .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (lint)
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Build Android APK (debug)
        run: flutter build apk --debug
