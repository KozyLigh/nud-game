name: nud_game
description: NUD - 2D mobile game built with Flutter and Flame.
publish_to: none

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flame_test: ^1.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
